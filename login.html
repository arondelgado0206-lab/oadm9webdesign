<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login Page</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">
    <div class="top-bar">
        <a href="Weverse.html" class="icon-btn">←</a>
        <i class="fa-solid fa-arrow-left"></i></a>
        <h1>Log In</h1>
        <a href="Weverse.html" class="icon-btn"><i class="fa-solid fa-xmark"></i></a>
</div>
    <form id="loginForm">
        <div class="input-box"><input type="email" id="email" placeholder="your@email.com" required></div>
        <div class="input-box password-box"><input type="password" id="password" placeholder="Password" required>
        <i class="fa-regular fa-eye-slash" id="togglePassword"></i></div>
        <p id="error" style="color:red;"></p><button type="submit" class="login-btn">Login</button>
    </form>

    <a href="#" class="reset-link">Reset your password</a>
    <p class="help-text">Having trouble logging in? <span>Learn more</span></p>
    <div class="signup-text">New to Weverse? <span>Sign Up</span></div>
</div>
<script src="login.js"></script>

</body>
</html>
